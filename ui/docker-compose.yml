---
services:
  pmm-server:
    container_name: pmm-server
    # Temporary till we have arm builds
    platform: linux/amd64
    image: ${PMM_SERVER_IMAGE:-perconalab/pmm-server:3-dev-container}
    ports:
      - 80:9080
      - 443:8443
    volumes:
      - ./pmm-dev.conf:/etc/nginx/conf.d/pmm-dev.conf:ro
      # Uncomment to persist pmm state
      # - pmm-data:/srv

      # Uncomment to use custom (FE) grafana code
      # - '../../grafana/public:/usr/share/grafana/public'

      # PMM compat plugin
      - ./apps/pmm-compat/dist:/srv/grafana/plugins/pmm-compat

      # PMM UI (only useful if testing rendering server, for example. Otherwise, just stick with the vite dev server)
      # - ./apps/pmm/dist:/usr/share/pmm-ui
      # Uncomment to use custom (FE) Grafana dashboards
      # - ../../grafana-dashboards/pmm-app/dist:/srv/grafana/plugins/pmm-app
      # Mount repo so you can run the backend built from this codebase
      # - ..:/root/go/src/github.com/percona/pmm
      # - ../Makefile.devcontainer:/root/go/src/github.com/percona/pmm/Makefile:ro
      # should be followed by running:
      # docker exec -u root -it pmm-server bash -c 'cd /root/go/src/github.com/percona/pmm && make run-agent'
      # docker exec -u root -it pmm-server bash -c 'cd /root/go/src/github.com/percona/pmm && make run-managed'

      # Mount local Grafana backend source (does not replace bundled Grafana binary by itself)
      # - '../../grafana:/root/go/src/github.com/grafana/grafana'
      # Build/swap Grafana backend via helper targets in ui/Makefile:
      # make grafana-be-build
      # make grafana-be-swap
      # or run all steps:
      # make grafana-be-refresh
    environment:
      - PMM_DEBUG=1
      - GF_DEFAULT_APP_MODE=development
      - PMM_WATCHTOWER_HOST=http://watchtower:8080
      - PMM_WATCHTOWER_TOKEN=123
      # Uncomment to specify to which docker image to update
      # - PMM_DEV_UPDATE_DOCKER_IMAGE=${PMM_UPDATE_IMAGE:-perconalab/pmm-server:3-dev-container}
      # Set custom snooze duration for updates
      # - PMM_UPDATE_SNOOZE_DURATION=1m
    command: >
      bash -c "
        # Inject livereload script into grafana index.html
        sed -i 's|</body>|<script src="http://localhost:35729/livereload.js"></script></body>|g' /usr/share/grafana/public/views/index.html;
        /opt/entrypoint.sh;
      "

  mysql:
    image: percona:5.7.30
    platform: linux/amd64
    container_name: pmm-agent_mysql
    command: >
      --sql-mode="ANSI_QUOTES"
      --performance-schema --innodb_monitor_enable=all
      --slow_query_log --log_slow_rate_limit=1 --log_slow_admin_statements --log_slow_slave_statements --slow_query_log_file=/mysql/slowlogs/slow.log --long_query_time=0
    ports:
      - '3306:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=ps
      - MYSQL_USER=pmm-agent
      - MYSQL_PASSWORD=pmm%*&agent-password
      - UMASK=0777 # for slowlog file
    volumes:
      - ./testdata/mysql:/mysql

  watchtower:
    container_name: watchtower
    platform: linux/amd64
    image: perconalab/watchtower
    hostname: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_HTTP_API_UPDATE=1
      - WATCHTOWER_HTTP_API_TOKEN=123

volumes:
  pmm-data:
