---
services:
  pmm-server:
    image: ${PMM_SERVER_IMAGE:-perconalab/pmm-server:3-dev-latest}
    container_name: pmm-server
    platform: linux/amd64
    ports:
      - "127.0.0.1:443:8443"
    environment:
      - PMM_DEBUG=1
      # for local development
      - PMM_DEV_ADVISOR_CHECKS_FILE=/srv/checks/custom-checks.yml
      # for check-dev
      # - PMM_DEV_PERCONA_PLATFORM_ADDRESS=check-dev.percona.com:443
    volumes:
      - ./testdata/checks:/srv/checks

  test_db:
    image: aleksi/test_db:1.1.0
    platform: linux/amd64
    container_name: test_db
    volumes:
      - test_db_mysql:/test_db/mysql/world:ro
      - test_db_postgres:/test_db/postgresql/world:ro

  # It is essential to have an extra directory `/slowlogs/` between host and container.
  mysql:
    image: ${MYSQL_IMAGE:-percona:5.7}
    platform: linux/amd64
    container_name: mysql
    command: >
      --sql-mode="ANSI_QUOTES"
      --performance-schema --innodb_monitor_enable=all
      --slow_query_log --slow_query_log_file=/mysql/slowlogs/slow.log --long_query_time=0
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root-password
      - MYSQL_USER=pmm-agent
      - MYSQL_PASSWORD=pmm-agent-password
      - UMASK=0777  # for slowlog file
    depends_on:
      test_db:
        condition: service_completed_successfully
    volumes:
      - test_db_mysql:/docker-entrypoint-initdb.d/:ro
      - ./testdata/mysql:/mysql

  mongo:
    image: ${MONGO_IMAGE:-percona/percona-server-mongodb:6.0}
    container_name: mongo
    command:
      - --profile=2
      - --logpath=/var/log/mongodb/mongo.log
      - --logappend
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root-password
      - PERCONA_TELEMETRY_DISABLE=1
    volumes:
      - ./testdata/mongo/var/log/mongodb:/var/log/mongodb

  mongo-with-tls:
    image: ${MONGO_IMAGE:-percona/percona-server-mongodb:6.0}
    container_name: mongo-with-tls
    environment:
      - PERCONA_TELEMETRY_DISABLE=1
    command:
      - --profile=2
      - --tlsMode=requireTLS
      - --tlsCertificateKeyFile=/etc/tls/certificates/server.pem
      - --tlsCAFile=/etc/tls/certificates/ca.crt
      - --tlsAllowInvalidCertificates
      - --bind_ip=0.0.0.0
      - --logpath=/var/log/mongodb/mongo_tls.log
      - --logappend
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - ./utils/tests/testdata/mongodb:/etc/tls/certificates
      - ./testdata/mongo/var/log/mongodb:/var/log/mongodb

  mongo-noauth:
    image: ${MONGO_IMAGE:-percona/percona-server-mongodb:6.0}
    container_name: mongo-noauth
    environment:
      - PERCONA_TELEMETRY_DISABLE=1
    command: --profile=2 -bind_ip=0.0.0.0 --noauth
    ports:
      - "127.0.0.1:27019:27017"

  mongo-repl:
    image: ${MONGO_IMAGE:-percona/percona-server-mongodb:6.0}
    container_name: mongo-repl
    environment:
      - MONGO_IMAGE=${MONGO_IMAGE:-percona/percona-server-mongodb:6.0}
      - PERCONA_TELEMETRY_DISABLE=1
    volumes:
      - ./testscripts/:/scripts
    command: /scripts/mongo-repl.sh
    ports:
      - "127.0.0.1:27020:27020"
      - "127.0.0.1:27021:27021"

  mongo-repl-with-tls:
    image: ${MONGO_IMAGE:-percona/percona-server-mongodb:6.0}
    container_name: mongorepl-with-tls
    command: /scripts/mongo-repl-with-tls.sh
    environment:
      - MONGO_IMAGE=${MONGO_IMAGE:-percona/percona-server-mongodb:6.0}
      - PERCONA_TELEMETRY_DISABLE=1
    ports:
      - "127.0.0.1:27022:27022"
      - "127.0.0.1:27023:27023"
    volumes:
      - ./testscripts/:/scripts
      - ./utils/tests/testdata/mongodb:/etc/tls/certificates

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:14}
    platform: linux/amd64
    container_name: postgres
    command: >
      -c shared_preload_libraries='${PG_PRELOADED_LIBS:-pg_stat_statements}'
      -c track_activity_query_size=2048
      -c pg_stat_statements.max=10000
      -c pg_stat_monitor.pgsm_query_max_len=10000
      -c pg_stat_statements.track=all
      -c pg_stat_statements.save=off
      -c track_io_timing=on
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=pmm-agent
      - POSTGRES_PASSWORD=pmm-agent-password
    depends_on:
      test_db:
        condition: service_completed_successfully
    volumes:
      - test_db_postgres:/docker-entrypoint-initdb.d/

  valkey:
    image: valkey/valkey:8.1
    container_name: valkey
    command: ["valkey-server", "--requirepass", "pmm-agent_password"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - test_db_valkey:/docker-entrypoint-initdb.d/

  sysbench:
    profiles:
      - sysbench
    image: perconalab/sysbench
    container_name: sysbench

volumes:
  test_db_mysql:
  test_db_postgres:
  test_db_valkey:
