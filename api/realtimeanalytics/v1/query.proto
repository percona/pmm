syntax = "proto3";

package realtimeanalytics.v1;

import "extensions/v1/redact.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// LockChainEntry represents a single link in a PostgreSQL lock chain.
message LockChainEntry {
  // Process ID of the session in this lock chain link.
  int32 pid = 1;
  // Lock mode (e.g. AccessExclusiveLock).
  string lock_mode = 2;
  // Lock type (e.g. relation, transactionid).
  string lock_type = 3;
  // Whether the lock is granted.
  bool granted = 4;
  // Query text of the session holding or waiting for the lock.
  string query_text = 5;
  // Duration the session has been in the current state.
  google.protobuf.Duration duration = 6;
}

// QueryPostgreSQLData holds PostgreSQL-specific Real-Time Analytics query information.
message QueryPostgreSQLData {
  // Backend process ID.
  int32 pid = 1;
  // Session state (active, idle in transaction, etc.).
  string state = 2;
  // Wait event type (Lock, IO, etc.).
  string wait_event_type = 3;
  // Wait event name.
  string wait_event = 4;
  // Backend type (client backend, parallel worker, etc.).
  string backend_type = 5;
  // Transaction start time (for idle-in-transaction duration).
  google.protobuf.Timestamp transaction_start_time = 6;
  // Last state change time.
  google.protobuf.Timestamp state_change_time = 7;
  // Leader PID for parallel workers (PostgreSQL 13+).
  int32 leader_pid = 8;
  // Lock chain from blocker to blocked session.
  repeated LockChainEntry lock_chain = 9;
  // Database name.
  string database_name = 10;
  // PostgreSQL username.
  string username = 11 [(extensions.v1.sensitive) = REDACT_TYPE_FULL];
  // Application name from pg_stat_activity.
  string application_name = 12;
  // True when query text was truncated by track_activity_query_size.
  bool query_truncated = 13;
}

// QueryMongoDBData holds MongoDB-specific Real-Time Analytics query information.
message QueryMongoDBData {
  // MongoDB instance address(host:port) that processing the query.
  string db_instance_address = 1;
  // Client application name from the MongoDB query.
  string client_app_name = 2;
  // Database name.
  string database_name = 3;
  // Collection name.
  string collection = 4;
  // Query operation ("find", "aggregate", "update", etc).
  string operation = 5;
  // The start time of the operation.
  google.protobuf.Timestamp operation_start_time = 6;
  // MongoDB user name associated with the query.
  string username = 7 [(extensions.v1.sensitive) = REDACT_TYPE_FULL];
  // Indicates if an index (COLLSCAN vs IXSCAN) was utilized in the query.
  string plan_summary = 8;
}

// QueryData represents a single Real-Time Analytics query data point.
// It includes general query information and a payload for database-specific details.
message QueryData {
  // PMM Service identifier that reported the query.
  string service_id = 1;
  // PMM Service name that reported the query.
  string service_name = 2;
  // Unique identifier for the query.
  string query_id = 3;
  // The text of the query.
  string query_text = 4;
  // Raw JSON representation of the query.
  string query_raw_json = 5;
  // Current query current execution time.
  google.protobuf.Duration query_execution_duration = 6;
  // Timestamp when the query data was collected by Real-Time Analytics agent.
  google.protobuf.Timestamp query_collect_time = 7;
  // Client address (host:port).
  string client_address = 8;
  // Database-specific payload.
  oneof payload {
    // MongoDB-specific query data.
    QueryMongoDBData mongo_db_payload = 9;
    // PostgreSQL-specific query data.
    QueryPostgreSQLData postgresql_payload = 10;
  }
}
