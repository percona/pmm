syntax = "proto3";

package realtimeanalytics.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "inventory/v1/agent_status.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "validate/validate.proto";

// RunningRealtimeAgent represents a currently running RTA agent.
message RunningRealtimeAgent {
  // Unique agent identifier.
  string agent_id = 1;
  // Service identifier that the agent is monitoring.
  string service_id = 2;
  // Service name.
  string service_name = 3;
  // Cluster name the service belongs to.
  string cluster = 4;
  // Timestamp when the agent was started.
  google.protobuf.Timestamp started_at = 5;
  // Current status of the agent.
  inventory.v1.AgentStatus status = 6;
}

// ListRunningRealtimeAgentsRequest contains optional filters for listing running RTA agents.
message ListRunningRealtimeAgentsRequest {
  // TODO: add filters if needed
}

// ListRunningRealtimeAgentsResponse returns the list of running RTA agents.
message ListRunningRealtimeAgentsResponse {
  // List of running RTA agents.
  repeated RunningRealtimeAgent agents = 1;
}

// ChangeRealtimeAnalyticsRequest contains parameters for enabling or disabling RTA.
message ChangeRealtimeAnalyticsRequest {
  // Enable or disable RTA.
  bool enable = 1;
  // Service identifier.
  string service_id = 2 [(validate.rules).string = {min_len: 1}];
}

// ChangeRealtimeAnalyticsResponse is the response for changing RTA configuration.
message ChangeRealtimeAnalyticsResponse {
  // Empty response for now.
}

// RealtimeAnalyticsService provides public API for managing Real-Time Analytics.
service RealtimeAnalyticsService {
  // ListRunningRealtimeAgents returns the list of currently running RTA agents.
  rpc ListRunningRealtimeAgents(ListRunningRealtimeAgentsRequest) returns (ListRunningRealtimeAgentsResponse) {
    option (google.api.http) = {get: "/v1/realtime/agents"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List Running RTA Agents"
      description: "Returns the list of all currently running Real-Time Analytics agents with their details including service, cluster, agent, and status information."
    };
  }

  // ChangeRealtimeAnalytics enables or disables RTA for a service.
  rpc ChangeRealtimeAnalytics(ChangeRealtimeAnalyticsRequest) returns (ChangeRealtimeAnalyticsResponse) {
    option (google.api.http) = {
      post: "/v1/realtime/change"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Change Real-Time Analytics Configuration"
      description: "Enables or disables Real-Time Analytics for a specific service."
    };
  }
}
