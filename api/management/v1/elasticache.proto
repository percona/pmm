syntax = "proto3";

package management.v1;

import "extensions/v1/redact.proto";
import "inventory/v1/agents.proto";
import "inventory/v1/nodes.proto";
import "inventory/v1/services.proto";
import "management/v1/metrics.proto";
import "validate/validate.proto";

// DiscoverElastiCacheEngine describes supported ElastiCache engines.
enum DiscoverElastiCacheEngine {
  DISCOVER_ELASTI_CACHE_ENGINE_UNSPECIFIED = 0;
  DISCOVER_ELASTI_CACHE_ENGINE_REDIS = 1;
  DISCOVER_ELASTI_CACHE_ENGINE_VALKEY = 2;
}

// DiscoverElastiCacheInstance models an ElastiCache replication group discovered by the API.
message DiscoverElastiCacheInstance {
  // AWS region.
  string region = 1;
  // AWS availability zone.
  string az = 2;
  // Replication group identifier.
  string instance_id = 3;
  // Cache node type (e.g. cache.r7g.large).
  string node_model = 4;
  // Primary endpoint address.
  string address = 5;
  // Primary endpoint port.
  uint32 port = 6;
  // Engine type (redis or valkey).
  DiscoverElastiCacheEngine engine = 7;
  // Engine version.
  string engine_version = 8;
  // Whether in-transit encryption is enabled.
  bool transit_encryption_enabled = 9;
  // Cluster name (replication group ID).
  string cluster = 10;
}

message DiscoverElastiCacheRequest {
  // AWS Access key. Optional — if empty, the default credential chain is used.
  string aws_access_key = 1 [(extensions.v1.sensitive) = REDACT_TYPE_FULL];
  // AWS Secret key. Optional.
  string aws_secret_key = 2 [(extensions.v1.sensitive) = REDACT_TYPE_FULL];
}

message DiscoverElastiCacheResponse {
  repeated DiscoverElastiCacheInstance elasticache_instances = 1;
}

message AddElastiCacheServiceParams {
  // AWS region.
  string region = 1 [(validate.rules).string.min_len = 1];
  // AWS availability zone.
  string az = 2;
  // Replication group identifier.
  string instance_id = 3 [(validate.rules).string.min_len = 1];
  // Cache node type.
  string node_model = 4;
  // Primary endpoint address.
  string address = 5 [(validate.rules).string.min_len = 1];
  // Primary endpoint port.
  uint32 port = 6 [(validate.rules).uint32.gt = 0];
  // Engine type.
  DiscoverElastiCacheEngine engine = 7;
  // PMM Agent ID.
  string pmm_agent_id = 8;
  // Unique across all Nodes user-defined name. Defaults to instance_id.
  string node_name = 9;
  // Unique across all Services user-defined name. Defaults to instance_id.
  string service_name = 10;
  // Environment name.
  string environment = 11;
  // Cluster name.
  string cluster = 12;
  // Replication set name.
  string replication_set = 13;
  // Username for scraping metrics.
  string username = 14;
  // Password for scraping metrics.
  string password = 15 [(extensions.v1.sensitive) = REDACT_TYPE_FULL];
  // Custom user-assigned labels for Node and Service.
  map<string, string> custom_labels = 16;
  // Skip connection check.
  bool skip_connection_check = 17;
  // Use TLS for database connections.
  bool tls = 18;
  // Skip TLS certificate and hostname validation.
  bool tls_skip_verify = 19;
  // Defines metrics flow model for this exporter.
  MetricsMode metrics_mode = 20;
  // Custom password for exporter endpoint /metrics.
  string agent_password = 21 [(extensions.v1.sensitive) = REDACT_TYPE_FULL];
}

message ElastiCacheServiceResult {
  inventory.v1.RemoteElastiCacheNode node = 1;
  inventory.v1.ValkeyService valkey_service = 2;
  inventory.v1.ValkeyExporter valkey_exporter = 3;
}
