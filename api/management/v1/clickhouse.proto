syntax = "proto3";

package management.v1;

import "extensions/v1/redact.proto";
import "inventory/v1/agents.proto";
import "inventory/v1/log_level.proto";
import "inventory/v1/services.proto";
import "management/v1/metrics.proto";
import "management/v1/node.proto";
import "validate/validate.proto";

// MetricsSource selects how ClickHouse metrics reach PMM.
enum MetricsSource {
  // Auto-probe the native endpoint and fall back to the managed exporter.
  METRICS_SOURCE_UNSPECIFIED = 0;
  // Scrape the ClickHouse native Prometheus endpoint (<prometheus> config).
  METRICS_SOURCE_NATIVE = 1;
  // Run a PMM-managed clickhouse_exporter process.
  METRICS_SOURCE_EXPORTER = 2;
}

message AddClickHouseServiceParams {
  // Node identifier on which the service is running.
  // Only one of these parameters should be present: node_id, node_name, add_node.
  string node_id = 1 [(validate.rules).string = {
    min_len: 1
    ignore_empty: true
  }];
  // Node name on which a service is running.
  // Only one of these parameters should be present: node_id, node_name, add_node.
  string node_name = 2 [(validate.rules).string = {
    min_len: 1
    ignore_empty: true
  }];
  // Create a new Node with those parameters.
  // Only one of these parameters should be present: node_id, node_name, add_node.
  AddNodeParams add_node = 3;
  // User-defined name, it is required and should be unique across all services.
  string service_name = 4 [(validate.rules).string.min_len = 1];
  // Node and Service access address (DNS name or IP).
  // Address (and port) or socket is required.
  string address = 5;
  // Service access port.
  // Port is required when the address is present.
  uint32 port = 6;
  // Service access socket.
  // Address (and port) or socket is required.
  string socket = 7;
  // The "pmm-agent" identifier which should run agents. Required.
  string pmm_agent_id = 8 [(validate.rules).string.min_len = 1];
  // ClickHouse username for scraping metrics.
  string username = 9 [(extensions.v1.sensitive) = REDACT_TYPE_FULL];
  // ClickHouse password for scraping metrics.
  string password = 10 [(extensions.v1.sensitive) = REDACT_TYPE_FULL];
  // Environment name.
  string environment = 11;
  // Cluster name.
  string cluster = 12;
  // Replication set name.
  string replication_set = 13;
  // Custom user-assigned labels for Service.
  map<string, string> custom_labels = 14;
  // Skip connection check.
  bool skip_connection_check = 15;
  // Use TLS for connection.
  bool tls = 16;
  // Skip TLS verification.
  bool tls_skip_verify = 17;
  // Defines metrics flow model for the ClickHouse exporter.
  // Metrics could be pushed to the server with vmagent,
  // pulled by the server, or the server could choose behavior automatically.
  MetricsMode metrics_mode = 18;
  // Exporter log level
  inventory.v1.LogLevel log_level = 19;
  // Optionally expose the exporter process on all public interfaces
  bool expose_exporter = 20;
  // TLS CA certificate.
  string tls_ca = 21;
  // TLS Certificate.
  string tls_cert = 22;
  // TLS Certificate Key.
  string tls_key = 23;
  // Custom password for exporter endpoint /metrics.
  string agent_password = 24 [(extensions.v1.sensitive) = REDACT_TYPE_FULL];
  // Selects the metrics source: native endpoint, managed exporter, or auto-probe.
  MetricsSource metrics_source = 25;
  // ClickHouse native Prometheus endpoint port (default 9363).
  // Used for the native source and the auto-probe.
  uint32 native_metrics_port = 26;
}

message ClickHouseServiceResult {
  inventory.v1.ClickHouseService service = 1;
  // Populated when metrics come from the managed exporter.
  inventory.v1.ClickHouseExporter clickhouse_exporter = 2;
  // Populated when metrics come from the ClickHouse native Prometheus endpoint.
  inventory.v1.ExternalExporter external_exporter = 3;
}
