syntax = "proto3";

package advisors.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "management/v1/severity.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "validate/validate.proto";

// AdvisorCheckInterval represents possible execution interval values for checks.
enum AdvisorCheckInterval {
  ADVISOR_CHECK_INTERVAL_UNSPECIFIED = 0;
  ADVISOR_CHECK_INTERVAL_STANDARD = 1;
  ADVISOR_CHECK_INTERVAL_FREQUENT = 2;
  ADVISOR_CHECK_INTERVAL_RARE = 3;
}

enum AdvisorCheckFamily {
  ADVISOR_CHECK_FAMILY_UNSPECIFIED = 0;
  ADVISOR_CHECK_FAMILY_MYSQL = 1;
  ADVISOR_CHECK_FAMILY_POSTGRESQL = 2;
  ADVISOR_CHECK_FAMILY_MONGODB = 3;
}

// AdvisorCheckResultStatus represents the outcome of an Advisor check run against a service.
enum AdvisorCheckResultStatus {
  ADVISOR_CHECK_RESULT_STATUS_UNSPECIFIED = 0;
  // The check ran and found no issue.
  ADVISOR_CHECK_RESULT_STATUS_OK = 1;
  // The check ran and detected an issue.
  ADVISOR_CHECK_RESULT_STATUS_FAILED = 2;
  // The check could not be executed.
  ADVISOR_CHECK_RESULT_STATUS_ERROR = 3;
}

// AdvisorCheckResult represents the check result returned from pmm-managed after running the check.
message AdvisorCheckResult {
  string summary = 1;
  string description = 2;
  management.v1.Severity severity = 3;
  map<string, string> labels = 4;
  // URL containing information on how to resolve an issue detected by an Advisor check.
  string read_more_url = 5;
  // Name of the monitored service on which the check ran.
  string service_name = 6;
}

// CheckResultSummary is a summary of check results.
message CheckResultSummary {
  string service_name = 1;
  string service_id = 2;
  // Number of failed checks for this service with severity level "EMERGENCY".
  uint32 emergency_count = 3;
  // Number of failed checks for this service with severity level "ALERT".
  uint32 alert_count = 4;
  // Number of failed checks for this service with severity level "CRITICAL".
  uint32 critical_count = 5;
  // Number of failed checks for this service with severity level "ERROR".
  uint32 error_count = 6;
  // Number of failed checks for this service with severity level "WARNING".
  uint32 warning_count = 7;
  // Number of failed checks for this service with severity level "NOTICE".
  uint32 notice_count = 8;
  // Number of failed checks for this service with severity level "INFO".
  uint32 info_count = 9;
  // Number of failed checks for this service with severity level "DEBUG".
  uint32 debug_count = 10;
}

// CheckResult represents the check results for a given service.
message CheckResult {
  string summary = 1;
  string description = 2;
  management.v1.Severity severity = 3;
  map<string, string> labels = 4;
  // URL containing information on how to resolve an issue detected by an Advisor check.
  string read_more_url = 5;
  // Name of the monitored service on which the check ran.
  string service_name = 6;
  // ID of the monitored service on which the check ran.
  string service_id = 7;
  // Name of the check that failed
  string check_name = 8;
  // Silence status of the check result
  bool silenced = 10;
}

// AdvisorCheck contains check name and status.
message AdvisorCheck {
  // Machine-readable name (ID) that is used in expression.
  string name = 1;
  // True if that check is enabled.
  bool enabled = 2;
  // Long human-readable description.
  string description = 3;
  // Short human-readable summary.
  string summary = 4;
  // Check execution interval.
  AdvisorCheckInterval interval = 5;
  // DB family.
  AdvisorCheckFamily family = 6;
}

message Advisor {
  // Machine-readable name (ID) that is used in expression.
  string name = 1;
  // Long human-readable description.
  string description = 2;
  // Short human-readable summary.
  string summary = 3;
  // Comment.
  string comment = 4;
  // Category.
  string category = 5;
  // Advisor checks.
  repeated AdvisorCheck checks = 6;
}

// ChangeAdvisorCheckParams specifies a single check parameters.
message ChangeAdvisorCheckParams {
  // The name of the check to change.
  string name = 1;
  optional bool enable = 2;
  // check execution interval.
  AdvisorCheckInterval interval = 4;
}

message StartAdvisorChecksRequest {
  // Names of the checks that should be started.
  repeated string names = 1;
}

message StartAdvisorChecksResponse {}

message ListAdvisorChecksRequest {}

message ListAdvisorChecksResponse {
  repeated AdvisorCheck checks = 1;
}

message ListAdvisorsRequest {}

message ListAdvisorsResponse {
  repeated Advisor advisors = 1;
}

message ChangeAdvisorChecksRequest {
  repeated ChangeAdvisorCheckParams params = 1;
}

message ChangeAdvisorChecksResponse {}

message ListFailedServicesRequest {}

message ListFailedServicesResponse {
  repeated CheckResultSummary result = 1;
}

message GetFailedChecksRequest {
  // Maximum number of results per page.
  optional int32 page_size = 1 [(validate.rules).int32.gte = 1];
  // Index of the requested page, starts from 0.
  optional int32 page_index = 2 [(validate.rules).int32.gte = 0];
  // Service ID.
  string service_id = 3;
}

message GetFailedChecksResponse {
  // Total number of results.
  int32 total_items = 1;
  // Total number of pages.
  int32 total_pages = 2;
  // Check results
  repeated CheckResult results = 3;
}

// CheckResultHistoryItem represents a single persisted Advisor check run against a service.
message CheckResultHistoryItem {
  // Unique identifier of the history record.
  string id = 1;
  // Name of the check that ran.
  string check_name = 2;
  // Name of the advisor the check belongs to.
  string advisor_name = 3;
  // Category of the advisor the check belongs to.
  string category = 4;
  // Check execution interval.
  AdvisorCheckInterval interval = 5;
  // ID of the monitored service on which the check ran.
  string service_id = 6;
  // Name of the monitored service on which the check ran.
  string service_name = 7;
  // Type of the monitored service on which the check ran.
  string service_type = 8;
  // ID of the node the service runs on.
  string node_id = 9;
  // Name of the node the service runs on.
  string node_name = 10;
  // Outcome of the check run.
  AdvisorCheckResultStatus status = 11;
  // Short human-readable summary of the result.
  string summary = 12;
  // Long human-readable description of the result.
  string description = 13;
  // URL containing information on how to resolve a detected issue.
  string read_more_url = 14;
  // Severity of the result.
  management.v1.Severity severity = 15;
  // Result labels.
  map<string, string> labels = 16;
  // Time when the check ran.
  google.protobuf.Timestamp checked_at = 17;
  // Whether the result has been marked as read.
  bool is_read = 18;
}

message ListCheckResultsHistoryRequest {
  // Maximum number of results per page.
  optional int32 page_size = 1 [(validate.rules).int32.gte = 1];
  // Index of the requested page, starts from 0.
  optional int32 page_index = 2 [(validate.rules).int32.gte = 0];
  // Filter by service ID.
  string service_id = 3;
  // Filter by outcome.
  optional AdvisorCheckResultStatus status = 4;
  // Filter by read state.
  optional bool is_read = 5;
  // Return only results recorded at or after this time.
  google.protobuf.Timestamp from = 6;
  // Return only results recorded at or before this time.
  google.protobuf.Timestamp to = 7;
  // Filter by service name (partial, case-insensitive match).
  string service_name = 8;
  // Filter by node name (partial, case-insensitive match).
  string node_name = 9;
  // Filter by advisor category.
  string category = 10;
  // Filter by check name.
  string check_name = 11;
  // Filter by severity.
  optional management.v1.Severity severity = 12;
}

message ListCheckResultsHistoryResponse {
  // Total number of results.
  int32 total_items = 1;
  // Total number of pages.
  int32 total_pages = 2;
  // History records.
  repeated CheckResultHistoryItem results = 3;
}

message MarkCheckResultsReadRequest {
  // IDs of the history records to update.
  repeated string ids = 1 [(validate.rules).repeated.min_items = 1];
  // Read state to set on the records.
  bool is_read = 2;
}

message MarkCheckResultsReadResponse {}

// AdvisorService service provides public Management API methods for Advisor Service.
service AdvisorService {
  // ListFailedServices returns a list of services with failed checks.
  rpc ListFailedServices(ListFailedServicesRequest) returns (ListFailedServicesResponse) {
    option (google.api.http) = {get: "/v1/advisors/failedServices"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List Failed Services"
      description: "Returns a list of services with failed checks and a summary of check results."
    };
  }
  // GetFailedChecks returns the checks result for a given service.
  rpc GetFailedChecks(GetFailedChecksRequest) returns (GetFailedChecksResponse) {
    option (google.api.http) = {get: "/v1/advisors/checks/failed"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get Failed Advisor Checks"
      description: "Returns the latest check results for a given service."
    };
  }
  // ListCheckResultsHistory returns the history of Advisor check runs.
  rpc ListCheckResultsHistory(ListCheckResultsHistoryRequest) returns (ListCheckResultsHistoryResponse) {
    option (google.api.http) = {get: "/v1/advisors/checks/history"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List Advisor Check Results History"
      description: "Returns the history of Advisor check runs, including their outcomes."
    };
  }
  // MarkCheckResultsRead sets the read state on Advisor check history records.
  rpc MarkCheckResultsRead(MarkCheckResultsReadRequest) returns (MarkCheckResultsReadResponse) {
    option (google.api.http) = {
      post: "/v1/advisors/checks/history:markRead"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Mark Advisor Check Results Read"
      description: "Sets the read state on the specified Advisor check history records. Set is_read to false to mark them unread."
    };
  }
  // StartAdvisorChecks executes Advisor checks and returns when all checks are executed.
  rpc StartAdvisorChecks(StartAdvisorChecksRequest) returns (StartAdvisorChecksResponse) {
    option (google.api.http) = {
      post: "/v1/advisors/checks:start"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Start Advisor Checks"
      description: "Executes Advisor checks and returns when all checks are executed. All available checks will be started if check names aren't specified."
    };
  }
  // ListAdvisorChecks returns a list of advisor checks available to the user..
  rpc ListAdvisorChecks(ListAdvisorChecksRequest) returns (ListAdvisorChecksResponse) {
    option (google.api.http) = {get: "/v1/advisors/checks"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List Advisor Checks"
      description: "List advisor checks available to the user."
    };
  }
  // ListAdvisors returns a list of advisors available for the user.
  rpc ListAdvisors(ListAdvisorsRequest) returns (ListAdvisorsResponse) {
    option (google.api.http) = {get: "/v1/advisors"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List Advisors"
      description: "List advisors available to the user."
    };
  }
  // ChangeAdvisorChecks enables/disables Advisor checks or changes their exec interval.
  rpc ChangeAdvisorChecks(ChangeAdvisorChecksRequest) returns (ChangeAdvisorChecksResponse) {
    option (google.api.http) = {
      post: "/v1/advisors/checks:batchChange"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Change Advisor Checks"
      description: "Enables/disables advisor checks or changes their exec interval."
    };
  }
}
