          exit 1
        parameters:
          service_id:
            description: "PMM service UUID from pmm_list_services or pmm_get_service (inventory)."
          table_name:
            description: "Table name (optionally db.table)."
          database:
            description: "Optional. When from QAN/pmm.metrics use only the schema column (database where the query was executed). Never use a database column; always use schema."
      - name: pmm_mysql_show_index
