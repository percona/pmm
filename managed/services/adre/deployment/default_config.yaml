  pmm-nomad:
    enabled: true
    description: |
      Register (run) a fixed Nomad batch job fix_mysql_owner on one client: chown mysql datadir + systemctl restart mysql via raw_exec.
      DESTRUCTIVE. Only when the user explicitly asks to execute this remediation via Nomad and names the target Nomad client.
    llm_instructions: |
      Use **only** when the user clearly asks to run the **fix_mysql_owner** Nomad job (MySQL datadir ownership + service restart) on a specific host **via Nomad**.
      Do **not** call this tool for casual chat, generic investigations, or vague "fix mysql" requests without explicit Nomad execution intent.
      Before calling: the user must confirm the target **Nomad client Name** (from Nomad UI → Clients or GET …/nomad/v1/nodes). That Name is **not** always the same string as PMM inventory `node_name`; if unsure, say so and ask the user or infer only after listing Nomad nodes (user may paste JSON).
      Pass **nomad_datacenter** when the client’s Datacenter is not the default (see env PMM_NOMAD_DATACENTER / parameter default).
      After the tool returns, summarize EvalID / HTTP outcome and warn that **raw_exec** ran on the host.
      If Nomad is disabled or credentials wrong, report the error; do not retry blindly.
    tools:
      - name: pmm_nomad_run_fix_mysql_owner
        description: |
          Register Nomad job fix_mysql_owner constrained to one client: runs chown -R mysql:mysql /var/lib/mysql/* && systemctl restart mysql (raw_exec).
          Requires Nomad client Name (exact match to Nomad node Name). Uses PMM /nomad API (Basic auth). DESTRUCTIVE.
        command: |
          set -e
          if [ -n "${PMM_NOMAD_API_BASE:-}" ]; then
            NOMAD_API="${PMM_NOMAD_API_BASE%/}"
          else
            NOMAD_API="${PMM_URL%/}/nomad"
          fi
          NUSER="${PMM_NOMAD_BASIC_USER:-admin}"
          NPASS="${PMM_NOMAD_BASIC_PASSWORD:-admin}"
          NODE="{{ nomad_client_name }}"
          DC_RAW="{{ nomad_datacenter | default('') }}"
          if [ -z "$DC_RAW" ]; then
            DC="${PMM_NOMAD_DATACENTER:-PMM Deployment}"
          else
            DC="$DC_RAW"
          fi
          [ -z "$NODE" ] && { echo '{"error":"nomad_client_name is required"}'; exit 1; }
          JOBHCL=$(jq -rn --arg dc "$DC" --arg node "$NODE" '["job \"fix_mysql_owner\" {",("  datacenters = [\""+$dc+"\"]"),"  type        = \"batch\"","","  constraint {","    attribute = \"${node.unique.name}\"","    operator  = \"=\"",("    value     = \""+$node+"\""),"  }","","  group \"g\" {","    task \"fix\" {","      driver = \"raw_exec\"","      config {","        command = \"/bin/bash\"","        args    = [\"-c\", \"chown -R mysql:mysql /var/lib/mysql/* && systemctl restart mysql\"]","      }","    }","  }","}"] | join("\n")')
          PARSED_JSON=$(printf '%s' "$JOBHCL" | jq -Rs '{JobHCL: ., Canonicalize: true}' \
            | curl -sk -u "$NUSER:$NPASS" -X POST "$NOMAD_API/v1/jobs/parse" \
                -H 'Content-Type: application/json' -d @-)
          if ! echo "$PARSED_JSON" | jq -e . >/dev/null 2>&1; then
            echo "{\"error\":\"Nomad parse failed\",\"raw\":$(echo "$PARSED_JSON" | jq -Rs .)}"
            exit 1
          fi
          if echo "$PARSED_JSON" | jq -e 'has("ID") | not' >/dev/null 2>&1; then
            echo "{\"error\":\"Unexpected parse response\",\"body\":$PARSED_JSON}"
            exit 1
          fi
          curl -sk -u "$NUSER:$NPASS" -X PUT "$NOMAD_API/v1/job/fix_mysql_owner" \
            -H 'Content-Type: application/json' \
            -d "$(echo "$PARSED_JSON" | jq '{Job: .}')"
        parameters:
          nomad_client_name:
            description: "Exact Nomad client Name to constrain the job (from Nomad UI Clients or GET /nomad/v1/nodes field Name)."
          nomad_datacenter:
            description: "Nomad datacenter allow-list entry for this job; must match the target client’s Datacenter. Omit to use PMM_NOMAD_DATACENTER env or default PMM Deployment."
        transformers:
          - name: llm_summarize
            config:
              input_threshold: 4000
              prompt: |
                Summarize for an on-call engineer: whether Nomad accepted the job registration, EvalID if present, and that raw_exec ran chown + systemctl restart mysql on the constrained host. Flag any error JSON.

  # Investigation report generator: structures loop context (sub-conversation with Holmes Agent) into structured JSON.
  # Used by PMM Agent when it has gathered enough info from ask_holmes; does not call other tools.
  investigation-report-generator:
    enabled: true
    description: "Structures the given loop context (sub-conversation messages and optional summary) into a structured JSON investigation report. Does not call other tools; input is messages array and optional summary. Output: JSON with summary, findings, evidence, recommendations."
    llm_instructions: |
      Use when the PMM Agent has gathered enough information from the ask_holmes loop and needs a structured report.
      Input: messages (array of {role, content} from the sub-conversation) and optional summary string.
      Output: Structured JSON report with summary, findings, evidence, recommendations. Do not call other tools.
      Include in findings everything the investigation discovered: primary cause, and any secondary or related issues (e.g. errors in logs like permission denied or file not found), consequences, and same-time events. Do not omit any; list each with a brief assessment (cause, consequence, or co-occurring and whether follow-up is needed).
      CRITICAL — Recommendations: For every recommendation that involves running a command (add index, drop index, ALTER TABLE, restart service, fix config, fix permissions, etc.), include the exact command(s) in the report. Do not write only "add an index on column k" — write the full SQL or shell command (e.g. ALTER TABLE sbtest.sbtest2 ADD INDEX idx_k (k); or systemctl restart mysql). Each "Next Steps" or remediation step that has a runnable command must contain that command.
      When the sub-conversation includes relevant dashboard panels (image_url and dashboard_url from pmm_render_grafana_panel), include them in the report. Add an optional "panels" or "evidence_panels" array: each entry has image_url, dashboard_url, and a short caption/title (e.g. "QPS during incident window"). Where the investigation references metrics, trends, or dashboard context, list the corresponding rendered panels so the report UI can show the image and "Open in Grafana" link.
    tools:
      - name: investigation_report_generator
        description: "Generate a structured investigation report JSON from the given loop context. Input: messages (array of {role, content}), optional summary. Output: JSON with summary, findings, evidence, recommendations. Does not call other tools."
        parameters:
          messages:
            description: "Array of message objects {role, content} from the sub-conversation with Holmes Agent."
          summary:
            description: "Optional short summary from the PMM Agent to guide the report structure."
        command: "echo '{\"summary\":\"\",\"findings\":[],\"recommendations\":[]}'"
