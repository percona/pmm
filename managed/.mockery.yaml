# This is the top-level configuration file for mockery.
disable-version-string: True
with-expecter: False
resolve-type-alias: False
issue-845-fix: True
inpackage: True
dir: "{{.InterfaceDir}}"
filename: "mock_{{ .InterfaceName | snakecase }}_test.go"
mockname: "mock{{ .InterfaceName | camelcase | firstUpper }}"
packages:
  # managed
  github.com/percona/pmm/managed/services/backup:
    interfaces:
      agentService:
      compatibilityService:
      jobsService:
      pbmPITRService:
      removalService:
      Storage:
        config:
          mockname: "Mock{{ .InterfaceName | camelcase | firstUpper }}"
      versioner:
  github.com/percona/pmm/managed/services/checks:
    interfaces:
      agentsRegistry:
  github.com/percona/pmm/managed/services/inventory:
    interfaces:
      agentService:
      agentsRegistry:
      agentsStateUpdater:
      connectionChecker:
      inventoryMetrics:
      prometheusService:
      serviceInfoBroker:
      versionCache:
  github.com/percona/pmm/managed/services/management:
    interfaces:
      agentsRegistry:
      agentsStateUpdater:
      checksService:
      connectionChecker:
      grafanaClient:
      jobsService:
      prometheusService:
      serviceInfoBroker:
      versionCache:
      victoriaMetricsClient:
  github.com/percona/pmm/managed/services/alerting:
    interfaces:
      grafanaClient:
  github.com/percona/pmm/managed/services/management/backup:
    interfaces:
      awsS3:
      backupService:
      scheduleService:
      removalService:
      pbmPITRService:
  github.com/percona/pmm/managed/services/management/dump:
    interfaces:
      dumpService:
  github.com/percona/pmm/managed/services/qan:
