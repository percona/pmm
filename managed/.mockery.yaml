      agentsRegistry:
      agentsStateUpdater:
  github.com/percona/pmm/managed/services/scheduler:
    interfaces:
      backupService:
  github.com/percona/pmm/managed/services/server:
    interfaces:
      agentsStateUpdater:
      checksService:
      grafanaClient:
      haService:
      prometheusService:
      supervisordService:
      telemetryService:
      templatesService:
      vmAlertExternalRules:
      nomadService:
  github.com/percona/pmm/managed/services/versioncache:
