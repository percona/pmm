---
templates:
  - name: pmm_node_high_cpu_load
    version: 1
    summary: Node high CPU load
    queries:
      - ref_id: A
        expr: |-
          (1 - avg by(node_name) (rate(node_cpu_seconds_total{mode="idle"}[5m])))
          * 100
      - ref_id: B
        expr: |-
          label_replace(vector(10), "node_name", "pmm-server", "", "")
          or (group by(node_name) (node_cpu_seconds_total) * 0 + [[ .threshold ]])
    expressions:
      - ref_id: C
        type: math
        expression: "$A > $B"
    condition: C
    params:
      - name: threshold
        summary: A percentage from configured maximum
        unit: "%"
        type: float
        range: [0, 100]
        value: 80
    for: 5m
    severity: warning
    annotations:
      summary: Node high CPU load ({{ $labels.node_name }})
      description: |-
        {{ $labels.node_name }} CPU load is more than [[ .threshold ]]%.
