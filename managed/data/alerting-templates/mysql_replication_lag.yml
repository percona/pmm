---
templates:
  - name: mysql_replication_lag
    version: 1
    summary: MySQL replication lag
    expr: |-
      mysql_slave_status_source_server_id > 0 and ON (instance) mysql_slave_status_seconds_behind_source > [[ .threshold ]]
    params:
      - name: threshold
        summary: Time in seconds
        unit: s
        type: float
        value: 300
    for: 5m
    severity: critical
    annotations:
      description: |-
        MySQL Replication Lagging on {{ $labels.instance }}
        VALUE = {{ $value }}
      summary: MySQL Replication Lagging on (instance {{ $labels.instance }})
