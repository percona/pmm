---
templates:
  - name: pmm_valkey_down
    version: 1
    summary: Valkey down
    expr: sum by (service_name, node_name) (redis_up) == bool 0 and on(node_name) pmm_managed_inventory_agents{agent_type="valkey_exporter", disabled="0"}
    for: 1m
    severity: critical
    annotations:
      summary: Valkey down ({{ $labels.service_name }})
      description: |-
        Valkey {{ $labels.service_name }} on {{ $labels.node_name }} is down.
