[program:qan-api2]
priority = 13
command =
	/usr/sbin/percona-qan-api2
		--data-retention=30
environment =
	PMM_CLICKHOUSE_ADDR="127.0.0.1:9440",
	PMM_CLICKHOUSE_DATABASE="pmm",
	PMM_CLICKHOUSE_USER="default",
	PMM_CLICKHOUSE_SSL_CA_PATH="/srv/tls/ca.crt",
	PMM_CLICKHOUSE_SSL_CERT_PATH="/srv/tls/ch-client.crt",
	PMM_CLICKHOUSE_SSL_KEY_PATH="/srv/tls/ch-client.key"

