apiVersion: v1
kind: Service
metadata:
  name: {{ include "pmm-headless.fullname" . }}-perses
  labels:
    {{- include "pmm-headless.labels" . | nindent 4 }}
    app: perses
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    {{- include "pmm-headless.selectorLabels" . | nindent 4 }}
    app: perses
