apiVersion: v1
kind: Service
metadata:
  name: {{ include "pmm-headless.fullname" . }}
  labels:
    {{- include "pmm-headless.labels" . | nindent 4 }}
    app: pmm-server
  {{- with .Values.pmmServer.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.pmmServer.service.type }}
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
  selector:
    {{- include "pmm-headless.selectorLabels" . | nindent 4 }}
    app: pmm-server
