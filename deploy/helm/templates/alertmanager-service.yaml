apiVersion: v1
kind: Service
metadata:
  name: {{ include "pmm-headless.fullname" . }}-alertmanager
  labels:
    {{- include "pmm-headless.labels" . | nindent 4 }}
    app: alertmanager
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9093
      targetPort: 9093
      protocol: TCP
  selector:
    {{- include "pmm-headless.selectorLabels" . | nindent 4 }}
    app: alertmanager
