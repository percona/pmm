---
services:
  pmm-server:
    profiles:
      - pmm
    image: ${PMM_SERVER_IMAGE:-perconalab/pmm-server:3-dev-container}
    platform: linux/amd64
    container_name: pmm-server
    hostname: pmm-server
    environment:
      - AWS_ACCESS_KEY
      - AWS_SECRET_KEY
      - PMM_ENABLE_ACCESS_CONTROL
      - PMM_ENABLE_NOMAD
      - PMM_ENABLE_INTERNAL_PG_QAN
      - PMM_PUBLIC_ADDRESS
      - PMM_RELEASE_PATH
      - PMM_RELEASE_VERSION
      - GO_VERSION
      - PMM_DEV_PERCONA_PLATFORM_ADDRESS
      - PMM_DEV_PERCONA_PLATFORM_INSECURE
      - PMM_DEV_TELEMETRY_INTERVAL
      - PMM_DEV_TELEMETRY_DISABLE_START_DELAY
      - PMM_DEV_TELEMETRY_DISABLE_SEND
      - PMM_DEV_TELEMETRY_RETRY_BACKOFF
      - PMM_DEBUG
      - PMM_DEV_ADVISOR_CHECKS_FILE
      - PMM_POSTGRES_ADDR
      - PMM_POSTGRES_DBNAME
      - PMM_POSTGRES_USERNAME
      - PMM_POSTGRES_DBPASSWORD
      - PMM_POSTGRES_SSL_MODE
      - PMM_POSTGRES_SSL_CA_PATH
      - PMM_POSTGRES_SSL_KEY_PATH
      - PMM_POSTGRES_SSL_CERT_PATH
      - PMM_DISABLE_BUILTIN_POSTGRES
      - PMM_CLICKHOUSE_ADDR
      - PMM_CLICKHOUSE_DATABASE
      - PMM_CLICKHOUSE_USER
      - PMM_CLICKHOUSE_PASSWORD
      - PMM_CLICKHOUSE_IS_CLUSTER
      - PMM_CLICKHOUSE_CLUSTER_NAME
      - PMM_DISABLE_BUILTIN_CLICKHOUSE
      - PMM_WATCHTOWER_HOST
      - PMM_WATCHTOWER_TOKEN
      - PMM_DEV_UPDATE_DOCKER_IMAGE
      - GF_SECURITY_ADMIN_USER
      - GF_SECURITY_ADMIN_PASSWORD
      - GF_RENDERING_SERVER_URL
      - GF_RENDERING_CALLBACK_URL
      - GF_EMAILS_WELCOME_EMAIL_ON_SIGN_UP
      - GF_SMTP_ENABLED
      - GF_SMTP_HOST
      - GF_SMTP_FROM_NAME
      - GF_SMTP_FROM_ADDRESS
      - GF_DATABASE_SSL_MODE
      - GF_DATABASE_CA_CERT_PATH
      - GF_DATABASE_CLIENT_KEY_PATH
      - GF_DATABASE_CLIENT_CERT_PATH

    # enable for delve
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

    # see https://github.com/golang/go/wiki/LinuxKernelSignalVectorBug#what-to-do
    ulimits:
      memlock: 67108864

    ports:
      - ${PMM_PORT_HTTPS:-443}:8443
      # For headless delve
      - ${PMM_PORT_DELVE:-2345}:2345
      # PG
      - ${PMM_PORT_PG:-5432}:5432
      # VM
      - ${PMM_PORT_VM:-9090}:9090
      # CH
      - ${PMM_PORT_CH_TCP:-9000}:9000
      - ${PMM_PORT_CH_HTTP:-8123}:8123
    volumes:
      - ./:/root/go/src/github.com/percona/pmm
      - ./managed/testdata/updater/:/home/pmm/.config/systemd/user/
      # clickhouse config for backup/restore
      - ./dev/clickhouse-config.xml:/etc/clickhouse-server/config.xml:ro
      # caching
      - go-modules:/root/go/pkg/mod
      - go-cache:/root/.cache
      - pmm-data:/srv
      # custom advisor files
      - ./managed/data/advisors/:/usr/local/percona/advisors/
      - ./managed/data/checks/:/usr/local/percona/checks/
      - ./managed/data/alerting-templates/:/usr/local/percona/alerting-templates/
      # nginx config overrides
      - ./build/ansible/roles/nginx/files/conf.d/pmm.conf:/etc/nginx/conf.d/pmm.conf:ro

  mail-server:
    profiles:
      - mail-server
    image: axllent/mailpit
    container_name: mail-server
    hostname: mail-server
    ports:
      - ${PMM_PORT_MAIL_SERVER_UI:-8025}:8025 # Web UI - http://localhost:8025

  renderer:
    profiles:
      - renderer
    image: grafana/grafana-image-renderer:latest
    environment:
      - RENDERING_VERBOSE_LOGGING=true
      - RENDERING_DUMPIO=true
      - IGNORE_HTTPS_ERRORS=true
      - LOG_LEVEL=debug
    ports:
      - ${PMM_PORT_RENDERER:-8081}:8081

  watchtower:
    profiles:
      - watchtower
    image: ${WATCHTOWER_IMAGE:-perconalab/watchtower}
    container_name: watchtower
    hostname: watchtower
    environment:
      - WATCHTOWER_HTTP_LISTEN_PORT
      - WATCHTOWER_HTTP_API_UPDATE
      - WATCHTOWER_HTTP_API_TOKEN=${PMM_WATCHTOWER_TOKEN}
      - WATCHTOWER_NO_RESTART
    volumes:
      - ${WATCHTOWER_DOCKER_PATH:-/var/run/docker.sock}:/var/run/docker.sock

volumes:
  go-modules:
    name: go-modules
  go-cache:
    name: go-cache
  pmm-data:
    name: pmm-data
