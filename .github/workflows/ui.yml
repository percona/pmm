name: UI

on:
  push:
    branches:
      - main
      - v3
      - pmm-*
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*
    paths-ignore:
      - "documentation/**"

  pull_request:
    paths-ignore:
      - "admin/**"
      - "agent/**"
      - "api-tests/**"
      - "docs/**"
      - "documentation/**"
      - "managed/**"
      - "managed-dev/**"
      - "qan-api2/**"
      - "vmproxy/**"
      - "update/**"

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: ${{ github.workspace }}/ui

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup nodejs
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: ui/.nvmrc
          cache: yarn
          cache-dependency-path: ui/yarn.lock

      - name: Run lint
        run: make lint

      - name: Run unit tests
        run: make test

      - name: Build application
        run: make build
