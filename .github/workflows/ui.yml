name: UI

on:
  push:
    branches:
      - main
      - v3
      - pmm-*
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*
    paths-ignore:
      - "documentation/**"

  pull_request:
    paths-ignore:
      - "admin/**"
      - "agent/**"
      - "api-tests/**"
      - "docs/**"
      - "documentation/**"
      - "managed/**"
      - "managed-dev/**"
      - "qan-api2/**"
      - "vmproxy/**"
      - "update/**"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: ${{ github.workspace }}/ui

    steps:
      - name: Check out code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup nodejs
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: ui/.nvmrc
          cache: yarn
          cache-dependency-path: ui/yarn.lock

      - name: Run lint
        run: make lint

      - name: Run unit tests
        run: make test

      - name: Build application
        run: make build
