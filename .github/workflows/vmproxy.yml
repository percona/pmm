---
name: VMProxy

on:
  pull_request:
    paths-ignore:
      - "admin/**"
      - "agent/**"
      - "api-tests/**"
      - "dev/docs/**"
      - "documentation/**"
      - "dashboards/**"
      - "managed/**"
      - "qan-api2/**"
      - "update/**"
      - "ui/**"

permissions:
  contents: read

env:
  GONOPROXY: 'github.com/percona,github.com/Percona-Lab'
  GONOSUMDB: 'github.com/percona,github.com/Percona-Lab'
  GOPRIVATE: 'github.com/percona,github.com/Percona-Lab'

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ github.workspace }}/vmproxy

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go release
        uses: ./.github/actions/setup-go-release

      - name: Build and install
        run: make install

      - name: Run tests
        run: make test-cover

      - name: Upload coverage results
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: cover.out
          flags: vmproxy
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run debug commands on failure
        if: ${{ failure() }}
        run: |
          env | sort
          go env | sort
          git status
