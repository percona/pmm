name: Merge Gatekeeper

on:
  pull_request:
  pull_request_target:

permissions:
  checks: read
  statuses: read
  packages: read

jobs:
  merge-gatekeeper:
    name: Merge Gatekeeper
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Merge Gatekeeper
        env:
          INPUT_SELF: Merge Gatekeeper
          INPUT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_INTERVAL: "45"
          INPUT_TIMEOUT: "1200"
          INPUT_IGNORED: "linkspector"
          INPUT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          docker run --rm \
            -e INPUT_SELF -e INPUT_TOKEN -e INPUT_INTERVAL \
            -e INPUT_TIMEOUT -e INPUT_IGNORED -e INPUT_REF \
            -e GITHUB_REPOSITORY -e GITHUB_EVENT_NAME \
            -e GITHUB_EVENT_PATH -e GITHUB_SHA -e GITHUB_REF \
            -e GITHUB_RUN_ID -e GITHUB_WORKSPACE \
            -v "$GITHUB_EVENT_PATH:$GITHUB_EVENT_PATH:ro" \
            ghcr.io/percona/pmm/merge-gatekeeper:2.0 validate
