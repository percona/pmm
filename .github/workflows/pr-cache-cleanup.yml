---
# This GitHub Actions workflow automatically cleans up caches associated with
# a Pull Request once it is closed. It listens for pull_request events of type closed
# and then proceeds to delete all GitHub Actions caches that were created for
# that specific Pull Request branch, freeing up storage and ensuring cache hygiene.
name: Cleanup PR Cache

on:
  pull_request:
    types:
      - closed

jobs:
  cleanup:
    name: Delete PR caches
    runs-on: ubuntu-latest

    permissions:
      # 'actions: write' is strictly required to delete caches
      actions: write
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Delete caches for the PR branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "[INFO] Deleting caches for PR #${{ github.event.pull_request.number }}"

          # Delete caches associated with the PR merge ref
          gh cache delete --all --succeed-on-no-caches --ref "refs/pull/${{ github.event.pull_request.number }}/merge"

          echo "[INFO] Cache cleanup complete"
