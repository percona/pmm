name: Sync API Docs
on:
  push:
    branches:
      - main
      - v3
    paths:
      - "api/**"
      - "docs/api/**"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync API Docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Detect PMM version and API ID
        run: |
          # For reference:
          # PMM 2: VERSION=v2
          # PMM 3: VERSION=v3
          export VERSION=$(cat api/swagger/swagger.json | jq -r '.info.version')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: API
        uses: readmeio/rdme@ec5cd68823bff400ae286b6698c29f81e21f08d6 # v10.9.0
        with:
          rdme: openapi upload ./api/swagger/swagger.json --useSpecVersion --slug=pmm-api.json --key=${{ secrets.README_TOKEN }}

      - name: Markdown docs
        uses: readmeio/rdme@ec5cd68823bff400ae286b6698c29f81e21f08d6 # v10.9.0
        with:
          rdme: reference upload docs/api/ --branch=${{ env.VERSION }}  --key=${{ secrets.README_TOKEN }}
