name: Sync API Docs
on:
  push:
    branches:
      - main
      - v3
    paths:
      - "api/**"
      - "docs/api/**"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync API Docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect PMM version and API ID
        run: |
          # For reference:
          # PMM 2: VERSION=v2
          # PMM 3: VERSION=v3
          export VERSION=$(cat api/swagger/swagger.json | jq -r '.info.version')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: API
        uses: readmeio/rdme@3c41af599df44e516c90ba4107a81c05d4945822 # v10.6.2
        with:
          rdme: openapi upload ./api/swagger/swagger.json --useSpecVersion --slug=pmm-api.json --key=${{ secrets.README_TOKEN }}

      - name: Markdown docs
        uses: readmeio/rdme@3c41af599df44e516c90ba4107a81c05d4945822 # v10.6.2
        with:
          rdme: reference upload docs/api/ --branch=${{ env.VERSION }}  --key=${{ secrets.README_TOKEN }}
