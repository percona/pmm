name: upstream sync

# Keeps the datacosmos fork in step with percona/pmm. On a schedule it refreshes
# the upstream-sync branch from percona/pmm and opens (or updates) a pull request
# into main — so upstream changes only ever reach main through a reviewed PR.
on:
  schedule:
    - cron: "0 6 * * *"   # daily, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      UPSTREAM_URL: https://github.com/percona/pmm.git
      UPSTREAM_BRANCH: v3
      SYNC_BRANCH: upstream-sync
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Push via an SSH deploy key, not GITHUB_TOKEN: the default App token is
          # refused when the upstream branch touches .github/workflows/** ("refusing
          # to allow a GitHub App to ... update workflow ... without workflows
          # permission"). A deploy key is not an App token, so it can mirror workflow
          # files. Read-write deploy key; private half in secrets.
          ssh-key: ${{ secrets.UPSTREAM_SYNC_DEPLOY_KEY }}

      - name: Refresh the sync branch from upstream
        run: |
          git remote add upstream "$UPSTREAM_URL" 2>/dev/null \
            || git remote set-url upstream "$UPSTREAM_URL"
          git fetch upstream "$UPSTREAM_BRANCH"
          git push -f origin \
            "refs/remotes/upstream/${UPSTREAM_BRANCH}:refs/heads/${SYNC_BRANCH}"

      - name: Open or refresh the sync pull request
        # Prefer a PAT if provided (can create PRs on a fork); fall back to the
        # App token. The branch was already mirrored in the step above, so PR
        # creation is best-effort: when no PR-capable token exists the run still
        # succeeds with the branch synced.
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_SYNC_PAT || secrets.GITHUB_TOKEN }}
        run: |
          open_pr="$(gh pr list --head "$SYNC_BRANCH" --base main \
            --state open --json number --jq '.[].number')"
          if [ -n "$open_pr" ]; then
            echo "Sync PR #${open_pr} already open - its branch was updated."
            exit 0
          fi
          if gh pr create --head "$SYNC_BRANCH" --base main \
            --title "chore: sync upstream percona/pmm" \
            --body "Automated upstream sync from percona/pmm (branch v3). Review and merge to bring main up to date; resolve any conflicts with the datacosmos customizations."; then
            echo "Opened a new sync PR."
          else
            echo "::warning::Could not open the sync PR automatically. GITHUB_TOKEN cannot create pull requests on a fork; the upstream-sync branch is updated — open the PR manually, or add an UPSTREAM_SYNC_PAT secret (scope: repo + workflow) to automate it."
          fi
