---
name: Percona Intelligence
on:
  pull_request:
    paths:
      - '.github/workflows/percona-intelligence.yml'
      - '.github/actions/setup-go-release/**'
      - 'managed/cmd/pi-validator/**'
      - 'managed/data/alerting-templates/**'
      - 'managed/data/advisors/**'
      - 'managed/data/checks/**'
      - 'managed/pi/**'
      - 'managed/Makefile'
      - 'go.*'
      - '!**/*.md'

permissions:
  contents: read

env:
  GOPRIVATE: 'github.com/percona,github.com/Percona-Lab'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    continue-on-error: false
    defaults:
      run:
        working-directory: ${{ github.workspace }}/managed

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go release
        uses: ./.github/actions/setup-go-release

      - name: Build PMM PI validator
        run: make release-pi-validator

      - name: Print version
        run: ../bin/pi-validator --help

  validate:
    name: Validate PI files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ github.workspace }}/managed

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go release
        uses: ./.github/actions/setup-go-release

      - name: Validate PI files
        run: make pi-validate
