---
name: Percona Intelligence
on:
  pull_request:
    paths:
      - 'managed/data/alerting-templates/**'
      - 'managed/data/advisors/**'
      - 'managed/data/checks/**'

permissions:
  contents: read

env:
  GOPRIVATE: 'github.com/percona,github.com/Percona-Lab'

jobs:
  validate:
    name: Validate PI files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go release
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ github.workspace }}/go.mod
          cache: false

      - name: Enable Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('go.mod', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Enable Go modules cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-modules-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-modules-

      - name: Download Go modules
        run: |
          go mod download -x

      - name: Validate PI files
        run: make -C managed pi-validate
