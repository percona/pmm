name: datacosmos release

# The only build/publish workflow on the datacosmos fork. Triggered by a
# datacosmos version tag (v3-*), it builds the PMM packages and Docker images
# from source for BOTH linux/amd64 and linux/arm64 — each on its native
# runner — then merges them into multi-arch images and a GitHub Release.
on:
  push:
    tags:
      - "v3-*"
  workflow_dispatch:
    inputs:
      dc_version:
        description: "datacosmos version tag (e.g. v3-2026-05-17-5580)"
        required: true

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to ghcr.io/datacosmos-br

jobs:
  build:
    name: build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MATRIX_ARCH: ${{ matrix.arch }}
      DC_INPUT: ${{ github.event.inputs.dc_version }}
      # Collect artifacts inside the workspace: actions/upload-artifact@v4
      # rejects '..' in its path, so ARTIFACT_DIR cannot be the Makefile
      # default (../pmm-artifacts). ROOT_DIR (the heavy build tree) stays out.
      ARTIFACT_DIR: ${{ github.workspace }}/pmm-artifacts
      # Upstream's public RPM cache (s3://pmm-build-cache) only holds x86_64
      # RPMs. Use it on amd64 (Grafana et al. come down prebuilt); skip it on
      # arm64, where it would feed is_build_needed a wrong-arch RPM and skip
      # the build that must happen.
      SKIP_S3_CACHE: ${{ matrix.arch == 'arm64' && '1' || '' }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Derive datacosmos version
        id: ver
        run: |
          # The v3-<date>-<count> tag is the version string verbatim.
          dc="${DC_INPUT:-${GITHUB_REF_NAME}}"
          echo "dc_version=${dc}" >> "$GITHUB_OUTPUT"

      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache || true
          docker system prune -af || true

      # No custom caching: build/scripts/vars pulls the upstream rpmbuild
      # image (public.ecr.aws/e7j3v3n0/rpmbuild:3) and build-server-rpm's
      # is_build_needed reuses upstream's public RPM cache
      # (s3://pmm-build-cache) — Grafana et al. come down prebuilt.
      - name: Build pmm-client and pmm-server (native)
        run: make -f Makefile.datacosmos client server

      - name: Publish per-arch images to ghcr.io
        env:
          DC_VERSION: ${{ steps.ver.outputs.dc_version }}
        run: |
          make -f Makefile.datacosmos publish-client-image publish-server-image \
            DC_VERSION="${DC_VERSION}" IMAGE_ARCH="${MATRIX_ARCH}"

      - name: Collect build artifacts
        run: make -f Makefile.datacosmos publish

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmm-artifacts-${{ matrix.arch }}
          path: pmm-artifacts/**
          if-no-files-found: ignore

  release:
    name: multi-arch manifests and release
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DC_INPUT: ${{ github.event.inputs.dc_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive datacosmos version and tag
        id: ver
        run: |
          # The v3-<date>-<count> tag is both the version string and the
          # release tag verbatim — no prefixing or stripping.
          dc="${DC_INPUT:-${GITHUB_REF_NAME}}"
          echo "dc_version=${dc}" >> "$GITHUB_OUTPUT"
          echo "tag=${dc}" >> "$GITHUB_OUTPUT"

      - name: Merge per-arch images into multi-arch tags
        env:
          DC_VERSION: ${{ steps.ver.outputs.dc_version }}
        run: make -f Makefile.datacosmos publish-manifests DC_VERSION="${DC_VERSION}"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          # Only the per-arch build artifacts — never any stray artifact
          # (e.g. a build-push-action *.dockerbuild record).
          pattern: pmm-artifacts-*

      - name: Create the GitHub Release
        env:
          DC_VERSION: ${{ steps.ver.outputs.dc_version }}
          TAG_NAME: ${{ steps.ver.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          # Flatten every per-arch artifact (tarballs + client/server RPMs +
          # debs) into dist/, prefixed with its source arch so amd64 and
          # arm64 files — including same-named noarch RPMs — never collide.
          mkdir -p dist
          while IFS= read -r f; do
            rel="${f#release-assets/}"
            arch="${rel%%/*}"; arch="${arch#pmm-artifacts-}"
            cp -f "$f" "dist/${arch}-$(basename "$f")"
          done < <(find release-assets -type f \
            \( -name '*.tar.gz' -o -name '*.rpm' -o -name '*.deb' \) 2>/dev/null)
          ls -la dist
          notes="datacosmos PMM ${DC_VERSION} — multi-arch (linux/amd64, linux/arm64), built from source and aligned to upstream Percona PMM.

          Images:
          - ghcr.io/datacosmos-br/pmm-server:${DC_VERSION}
          - ghcr.io/datacosmos-br/pmm-client:${DC_VERSION}
          - ghcr.io/datacosmos-br/pmm-rpmbuild:${DC_VERSION}

          Release assets: pmm-client tarballs and every generated RPM
          (pmm-client, pmm-managed, percona-qan-api2, vmproxy, pmm-dump,
          percona-dashboards, grafana, victoriametrics) for both arches,
          each prefixed amd64- / arm64-."
          gh release create "${TAG_NAME}" dist/* \
            --repo "${REPO}" \
            --title "PMM ${DC_VERSION}" \
            --notes "${notes}"
