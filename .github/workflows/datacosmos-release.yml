name: datacosmos release

# The only build/publish workflow on the datacosmos fork. Triggered by a
# datacosmos version tag (*-dc*), it builds the PMM packages and Docker images
# from source for BOTH linux/amd64 and linux/arm64 — each on its native
# runner — then merges them into multi-arch images and a GitHub Release.
on:
  push:
    tags:
      - "*-dc*"
  workflow_dispatch:
    inputs:
      dc_version:
        description: "datacosmos version (e.g. 3.7.1-dc1)"
        required: true

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to ghcr.io/datacosmos-br

jobs:
  build:
    name: build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MATRIX_ARCH: ${{ matrix.arch }}
      DC_INPUT: ${{ github.event.inputs.dc_version }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Derive datacosmos version
        id: ver
        run: |
          if [ -n "${DC_INPUT}" ]; then
            dc="${DC_INPUT}"
          else
            dc="${GITHUB_REF_NAME#v}"
          fi
          echo "dc_version=${dc}" >> "$GITHUB_OUTPUT"

      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache || true
          docker system prune -af || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The rpmbuild image is OracleLinux 9 + a fixed dnf package set, so its
      # layers rarely change — restore them from the GHA cache instead of
      # re-downloading every run. Tagged pmm-rpmbuild:local (the Makefile
      # default RPMBUILD_DOCKER_IMAGE), so `make client server` reuses it.
      - name: Build the rpmbuild image (layer-cached)
        uses: docker/build-push-action@v6
        with:
          context: build/docker/rpmbuild
          file: build/docker/rpmbuild/Dockerfile.el9
          tags: pmm-rpmbuild:local
          load: true
          pull: true
          cache-from: type=gha,scope=rpmbuild-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=rpmbuild-${{ matrix.arch }}

      # build-client-binary mounts the Go build cache and module cache as the
      # docker volumes pmm-gobuild / pmm-gomod. Persist them across runs: seed
      # the volumes from the GHA cache before building and dump them back
      # after — so even a failed run keeps every package that already compiled
      # and the next attempt only rebuilds what changed.
      - name: Restore Go build & module cache
        uses: actions/cache@v4
        with:
          path: /tmp/pmm-gocache
          key: pmm-gocache-${{ matrix.arch }}-${{ hashFiles('go.sum') }}-${{ github.run_id }}
          restore-keys: |
            pmm-gocache-${{ matrix.arch }}-${{ hashFiles('go.sum') }}-
            pmm-gocache-${{ matrix.arch }}-

      - name: Seed Docker volumes from cache
        run: |
          for v in gobuild gomod; do
            docker volume create "pmm-$v" >/dev/null
            if [ -d "/tmp/pmm-gocache/$v" ]; then
              docker run --rm -v "pmm-$v:/dst" -v "/tmp/pmm-gocache/$v:/src:ro" \
                alpine sh -c 'cp -a /src/. /dst/ 2>/dev/null || true'
            fi
          done

      - name: Build pmm-client and pmm-server (native)
        run: make -f Makefile.datacosmos client server

      - name: Dump Docker volumes to cache
        if: always()
        run: |
          for v in gobuild gomod; do
            mkdir -p "/tmp/pmm-gocache/$v"
            docker run --rm -v "pmm-$v:/src:ro" -v "/tmp/pmm-gocache/$v:/dst" \
              alpine sh -c 'cp -a /src/. /dst/ 2>/dev/null || true' || true
          done

      - name: Publish per-arch images to ghcr.io
        env:
          DC_VERSION: ${{ steps.ver.outputs.dc_version }}
        run: |
          make -f Makefile.datacosmos publish-client-image publish-server-image \
            DC_VERSION="${DC_VERSION}" IMAGE_ARCH="${MATRIX_ARCH}"

      - name: Collect build artifacts
        run: make -f Makefile.datacosmos publish

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmm-artifacts-${{ matrix.arch }}
          path: ../pmm-artifacts/**
          if-no-files-found: ignore

  release:
    name: multi-arch manifests and release
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DC_INPUT: ${{ github.event.inputs.dc_version }}
      REF_TYPE: ${{ github.ref_type }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive datacosmos version and tag
        id: ver
        run: |
          if [ -n "${DC_INPUT}" ]; then
            dc="${DC_INPUT}"
          else
            dc="${GITHUB_REF_NAME#v}"
          fi
          echo "dc_version=${dc}" >> "$GITHUB_OUTPUT"
          if [ "${REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${dc}" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge per-arch images into multi-arch tags
        env:
          DC_VERSION: ${{ steps.ver.outputs.dc_version }}
        run: make -f Makefile.datacosmos publish-manifests DC_VERSION="${DC_VERSION}"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create the GitHub Release
        env:
          DC_VERSION: ${{ steps.ver.outputs.dc_version }}
          TAG_NAME: ${{ steps.ver.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          mapfile -t assets < <(find release-assets -type f \
            \( -name '*.tar.gz' -o -name '*.rpm' -o -name '*.deb' \) 2>/dev/null)
          notes="datacosmos PMM ${DC_VERSION} — multi-arch (linux/amd64, linux/arm64), built from source and aligned to upstream Percona PMM.

          Images:
          - ghcr.io/datacosmos-br/pmm-server:${DC_VERSION}
          - ghcr.io/datacosmos-br/pmm-client:${DC_VERSION}
          - ghcr.io/datacosmos-br/pmm-rpmbuild:${DC_VERSION}"
          gh release create "${TAG_NAME}" "${assets[@]}" \
            --repo "${REPO}" \
            --title "PMM ${DC_VERSION}" \
            --notes "${notes}"
