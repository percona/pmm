name: Linkspector
on:
  pull_request:
    paths:
      - "documentation/**"
      - "!documentation/api/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, or SHA) to check links in."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  check-links:
    name: linkspector
    runs-on: ubuntu-22.04
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install Chrome for linkspector
        id: setup-chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2

      - name: Configure Chrome path for puppeteer
        run: echo "PUPPETEER_EXECUTABLE_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"

      - name: Run linkspector
        uses: umbrelladocs/action-linkspector@6c637d70424624231467a4ca918be54fa3b792d0 # v1.5.4
        with:
          github_token: ${{ secrets.ROBOT_TOKEN || secrets.GITHUB_TOKEN }}
          reporter: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
          fail_level: error
          filter_mode: nofilter
          config_file: documentation/.linkspector.yml
