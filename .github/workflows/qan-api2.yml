---
name: QAN

on:
  pull_request:
    paths:
      - '.github/workflows/qan-api2.yml'
      - '.github/actions/setup-go-release/**'
      - "api/**"
      - "qan-api2/**"
      - 'utils/**'
      - 'version/**'
      - 'go.*'
      - '!**/*.md'

permissions:
  contents: read

env:
  GOPRIVATE: 'github.com/percona,github.com/Percona-Lab'

jobs:
  check:
    name: Static checks
    runs-on: ubuntu-latest
    continue-on-error: false
    defaults:
      run:
        working-directory: ${{ github.workspace }}/qan-api2

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go release
        uses: ./.github/actions/setup-go-release

      - name: Check files formatting
        run: |
          make format
          git status
          git diff --exit-code

      - name: Run debug commands on failure
        if: ${{ failure() }}
        run: |
          env | sort
          git status

  build:
    name: Build
    runs-on: ubuntu-latest
    continue-on-error: false
    defaults:
      run:
        working-directory: ${{ github.workspace }}/qan-api2

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go release
        uses: ./.github/actions/setup-go-release

      - name: Build QAN
        run: make release

      - name: Print version
        run: ../bin/qan-api2 --version

  test:
    name: Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ github.workspace }}/qan-api2

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go release
        uses: ./.github/actions/setup-go-release

      - name: Initialize CI environment
        run: make test-env-up

      - name: Run Tests
        run: |
          make test-cover

      - name: Run debug commands on failure
        if: ${{ failure() }}
        run: |
          env | sort
          go env | sort
          git status
