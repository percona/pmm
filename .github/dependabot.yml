---
version: 2
updates:
# main branch
  - package-ecosystem: "gomod"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "daily"

  - package-ecosystem: "docker"
    directory: "/build/docker/client"
    target-branch: "main"
    schedule:
      interval: "daily"

  - package-ecosystem: "docker"
    directory: "/build/docker/rpmbuild"
    target-branch: "main"
    schedule:
      interval: "daily"

  - package-ecosystem: "docker"
    directory: "/build/docker/server"
    target-branch: "main"
    schedule:
      interval: "daily"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "daily"
