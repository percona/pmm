apiVersion: 1
deleteDatasources:
  - name: ClickHouse
    orgId: 1
  - name: PostgreSQL
    orgId: 1

datasources:
- name: Metrics
  version: 2
  orgId: 1
  type: prometheus
  access: proxy
  url: http://127.0.0.1:8430/
  isDefault: true
  jsonData:
    httpMethod: POST
    keepCookies: []
    timeInterval: 1s

- name: PTSummary
  version: 2
  orgId: 1
  type: pmm-pt-summary-datasource
  access: proxy

# https://github.com/grafana/clickhouse-datasource?tab=readme-ov-file#with-a-configuration-file
- name: ClickHouse
  orgId: 1
  version: 2
  type: grafana-clickhouse-datasource
  jsonData:
    username: ${PMM_CLICKHOUSE_USER}
    port: ${PMM_CLICKHOUSE_PORT}
    host: ${PMM_CLICKHOUSE_HOST}
    tlsSkipVerify: false
  secureJsonData:
    password: ${PMM_CLICKHOUSE_PASSWORD}
