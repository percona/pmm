apiVersion: 1
deleteDatasources:
  - name: ClickHouse
    orgId: 1

datasources:
- name: Metrics
  version: 2
  orgId: 1
  type: prometheus
  access: proxy
  url: http://127.0.0.1:8430/
  isDefault: true
  jsonData:
    httpMethod: POST
    keepCookies: []
    timeInterval: 1s

- name: PostgreSQL
  version: 2
  orgId: 1
  type: postgres
  access: proxy
  url: ${PMM_POSTGRES_ADDR}
  user: ${PMM_POSTGRES_USERNAME}
  database: ${PMM_POSTGRES_DBNAME}
  jsonData:
    sslRootCertFile: ${PMM_POSTGRES_SSL_CA_PATH}
    sslKeyFile: ${PMM_POSTGRES_SSL_KEY_PATH}
    sslCertFile: ${PMM_POSTGRES_SSL_CERT_PATH}
    postgresVersion: "1100"
    sslmode: ${PMM_POSTGRES_SSL_MODE}

- name: PTSummary
  version: 2
  orgId: 1
  type: pmm-pt-summary-datasource
  access: proxy

# https://github.com/grafana/clickhouse-datasource?tab=readme-ov-file#with-a-configuration-file
- name: ClickHouse
  orgId: 1
  version: 2
  type: grafana-clickhouse-datasource
  jsonData:
    username: ${PMM_CLICKHOUSE_USER}
    port: ${PMM_CLICKHOUSE_PORT}
    host: ${PMM_CLICKHOUSE_HOST}
    protocol: native
    secure: true
    tlsSkipVerify: false
    tlsCACertFile: ${PMM_CLICKHOUSE_SSL_CA_PATH}
    tlsClientCertFile: ${PMM_CLICKHOUSE_SSL_CERT_PATH}
    tlsClientKeyFile: ${PMM_CLICKHOUSE_SSL_KEY_PATH}
