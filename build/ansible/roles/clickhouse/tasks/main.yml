---
- name: Add ClickHouse repository
  yum_repository:
    name: clickhouse
    description: ClickHouse - Stable Repository
    baseurl: https://packages.clickhouse.com/rpm/stable/
    gpgkey: https://packages.clickhouse.com/rpm/stable/repodata/repomd.xml.key
    gpgcheck: no
    repo_gpgcheck: yes
    enabled: no

- name: Install clickhouse package
  dnf:
    name:
      - clickhouse-client-{{ clickhouse_version }}
      - clickhouse-server-{{ clickhouse_version }}
      - clickhouse-common-static-{{ clickhouse_version }}
    state: installed
    enablerepo: clickhouse

- name: Change ownership of clickhouse directories
  file:
    path: "{{ item }}"
    state: directory
    owner: pmm
    group: root
    mode: 0755
    recurse: yes
  loop:
    - /etc/clickhouse-server
    - /etc/clickhouse-client
    - /var/lib/clickhouse
    - /var/log/clickhouse-server
    - /run/clickhouse-server

- name: Copy customized clickhouse config files and dhparam.pem
  copy:
    src: "{{ item }}"
    dest: "/etc/clickhouse-server/{{ item }}"
    owner: pmm
    group: root
    mode: 0664
  loop:
    - dhparam.pem
    - low-memory-config.xml
    - default-config.xml
    - low-memory-users.xml
    - default-users.xml
    - switch-config.sh

- name: Set executable permissions for switch-config.sh
  file:
    path: /etc/clickhouse-server/switch-config.sh
    mode: 0755

- name: Create symlink for switch-config.sh
  file:
    src: /etc/clickhouse-server/switch-config.sh
    dest: "/opt/switch-config.sh"
    owner: pmm
    group: root
    state: link
    force: yes

# Gather file stats for config.xml and users.xml before using them in conditionals
- name: Stat config.xml
  stat:
    path: /etc/clickhouse-server/config.xml
  register: config_xml_stat

- name: Stat users.xml
  stat:
    path: /etc/clickhouse-server/users.xml
  register: users_xml_stat

- name: Remove config.xml if it exists and is not a symlink
  file:
    path: /etc/clickhouse-server/config.xml
    state: absent
  when: config_xml_stat.stat.exists and not config_xml_stat.stat.islnk

- name: Remove users.xml if it exists and is not a symlink
  file:
    path: /etc/clickhouse-server/users.xml
    state: absent
  when: users_xml_stat.stat.exists and not users_xml_stat.stat.islnk

- name: Create symlink for config.xml to default-config.xml
  file:
    src: /etc/clickhouse-server/default-config.xml
    dest: /etc/clickhouse-server/config.xml
    state: link
    owner: pmm
    group: root
    force: yes

- name: Create symlink for users.xml to default-users.xml
  file:
    src: /etc/clickhouse-server/default-users.xml
    dest: /etc/clickhouse-server/users.xml
    state: link
    owner: pmm
    group: root
    force: yes

# We need to remove capabilities because we run PMM in an unprivileged container
- name: Remove cap_ipc_lock from clickhouse binary
  capabilities:
    path: /usr/bin/clickhouse
    state: absent
    capability: "{{ item }}"
  loop:
    - cap_ipc_lock
    - cap_sys_nice
    - cap_net_admin

- name: Remove unused binaries
  file:
    path: /usr/bin/{{ item }}
    state: absent
  loop:
    - clickhouse-odbc-bridge
