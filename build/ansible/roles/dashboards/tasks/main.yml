---
# On PMM upgrade Grafana may already be running while bundled plugins under
# /srv/grafana/plugins are replaced. Grafana discovers plugins only at startup,
# so stop it before sync and start it afterward.
- name: Stop Grafana before plugin sync
  supervisorctl:
    name: grafana
    state: stopped
  failed_when: false
  become: true
  become_user: pmm
  become_method: su

- name: Retrieve Percona plugins
  find:
    paths: /usr/share/percona-dashboards/panels/
    depth: 2
    file_type: directory
  register: plugin_list

- name: Delete outdated plugins
  file:
    path: "/srv/grafana/plugins/{{ item['path'].split('/')[-1] }}"
    state: absent
  loop: "{{ plugin_list['files'] }}"

- name: Copy new plugins to the plugin directory
  copy:
    src: /usr/share/percona-dashboards/panels/
    dest: /srv/grafana/plugins/
    remote_src: yes

- name: Set permissions for the plugin directory
  file:
    path: /srv/grafana/plugins
    state: directory
    mode: 0775
    recurse: yes

- name: Synchronize Percona Dashboards version file after upgrade
  copy:
    src: /usr/share/percona-dashboards/VERSION
    dest: /srv/grafana/PERCONA_DASHBOARDS_VERSION
    mode: 0664
    remote_src: yes

- name: Start Grafana after plugin sync
  supervisorctl:
    name: grafana
    state: started
  failed_when: false
  become: true
  become_user: pmm
  become_method: su
