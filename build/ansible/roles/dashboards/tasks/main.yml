---
# Grafana stays down during this sync: while an upgrade is pending, pmm-managed
# renders the Grafana program with autostart=false (see grafanaAutostart in the
# supervisord service), so the bundled plugins under /srv/grafana/plugins are
# replaced while Grafana is not running. Grafana discovers plugins only at
# startup, so restart it once the sync is done to register them.
- name: Retrieve Percona plugins
  find:
    paths: /usr/share/percona-dashboards/panels/
    depth: 2
    file_type: directory
  register: plugin_list

- name: Delete outdated plugins
  file:
    path: "/srv/grafana/plugins/{{ item['path'].split('/')[-1] }}"
    state: absent
  loop: "{{ plugin_list['files'] }}"

- name: Copy new plugins to the plugin directory
  copy:
    src: /usr/share/percona-dashboards/panels/
    dest: /srv/grafana/plugins/
    remote_src: yes

- name: Set permissions for the plugin directory
  file:
    path: /srv/grafana/plugins
    state: directory
    mode: 0775
    recurse: yes

- name: Synchronize Percona Dashboards version file after upgrade
  copy:
    src: /usr/share/percona-dashboards/VERSION
    dest: /srv/grafana/PERCONA_DASHBOARDS_VERSION
    mode: 0664
    remote_src: yes

- name: Restart Grafana after plugin sync
  supervisorctl:
    name: grafana
    state: restarted
  failed_when: false
  become: true
  become_user: pmm
  become_method: su
