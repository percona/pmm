---
# We use percona-release package to install the gpg keys and ppg-14
# To workaround the package's incompatibility with RHEL9, we have to disable the gpg verification :(
- name: Add percona-release package
  dnf:
    name: https://repo.percona.com/yum/percona-release-latest.noarch.rpm
    state: installed
    disable_gpg_check: yes

- name: List installed gpg keys
  command: ls -la /etc/pki/rpm-gpg

- name: Update OS packages
  dnf:
    name: "*"
    state: latest
    disablerepo: percona-release-x86_64

- name: Install OS tools
  dnf:
    name:
      - python3-pip
      - rsync
      - iproute
      - nss_wrapper
    state: latest

- name: Create groups
  group:
    name: "{{ item.name }}"
    gid: "{{ item.gid }}"
  loop:
    - { name: pmm, gid: 1000 }
    - { name: nginx, gid: 1001 }
    - { name: clickhouse, gid: 1002 }

# Note: nginx and clickhouse users will get removed in post-build.
- name: Create users
  user:
    name: "{{ item.name }}"
    uid: "{{ item.uid }}"
    home: "{{ item.home }}"
    comment: "{{ item.comment }}"
    shell: "{{ item.shell }}"
    group: "{{ item.group }}"
  loop:
    - { name: pmm, uid: 1000, comment: "PMM Server", shell: "/usr/bin/bash", home: "/home/pmm", group: root, }
    - { name: nginx, uid: 1001, comment: "Nginx user", shell: "/sbin/nologin", home: "/dev/null", group: nginx, }
    - { name: clickhouse, uid: 1002, comment: "Clickhouse server", shell: "/sbin/nologin", home: "/dev/null", group: clickhouse, }

- name: Create directories with permissive mode for OpenShift compatibility
  file: 
    path: "{{ item }}"
    state: directory
    owner: pmm
    group: root
    mode: 0775
  loop:
    - /srv # otherwise it's owned by root
    - /srv/prometheus/rules
    - /etc/grafana
    - /srv/clickhouse

- name: Create pmm-server directory with write access for any user
  file:
    path: /usr/share/pmm-server
    state: directory
    owner: pmm
    group: root
    mode: 0775
    recurse: yes

# Note a special mode required mainly by nginx
- name: Create a directory for logs
  file:
    path: /srv/logs
    state: directory
    owner: pmm
    group: root
    mode: 0775

- name: Create dirs
  file: 
    path: "{{ item }}"
    state: directory
  loop:
    - /var/lib/cloud/scripts/per-once
    - /var/lib/cloud/scripts/per-boot

- name: Create server component directories
  file:
    path: "{{ item }}"
    state: directory
    owner: pmm
    group: root
    mode: 0775
  loop:
    - /usr/share/grafana
    - /usr/share/pmm-managed
    - /usr/share/pmm-ui
    - /usr/share/percona-dashboards
    - /usr/share/percona-dashboards/panels
    - /usr/local/percona
    - /usr/local/percona/advisors
    - /usr/local/percona/checks
    - /usr/local/percona/alerting-templates
    - /var/lib/grafana

- name: Install Go binaries
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: yes
  loop:
    - { src: /opt/pmm-staging/pmm-managed/bin/pmm-managed, dest: /usr/sbin/pmm-managed }
    - { src: /opt/pmm-staging/pmm-managed/bin/pmm-encryption-rotation, dest: /usr/sbin/pmm-encryption-rotation }
    - { src: /opt/pmm-staging/pmm-managed/bin/pmm-managed-init, dest: /usr/sbin/pmm-managed-init }
    - { src: /opt/pmm-staging/pmm-managed/bin/pmm-managed-starlark, dest: /usr/sbin/pmm-managed-starlark }
    - { src: /opt/pmm-staging/pmm-managed/bin/qan-api2, dest: /usr/sbin/percona-qan-api2 }
    - { src: /opt/pmm-staging/pmm-managed/bin/vmproxy, dest: /usr/sbin/vmproxy }
    - { src: /opt/pmm-staging/pmm-dump/pmm-dump, dest: /usr/sbin/pmm-dump }
    - { src: /opt/pmm-staging/grafana-go/grafana-server, dest: /usr/sbin/grafana-server }
    - { src: /opt/pmm-staging/grafana-go/grafana, dest: /usr/sbin/grafana }
    - { src: /opt/pmm-staging/grafana-go/grafana-cli, dest: /usr/bin/grafana-cli }
    - { src: /opt/pmm-staging/victoriametrics/victoria-metrics-pure, dest: /usr/sbin/victoriametrics }
    - { src: /opt/pmm-staging/victoriametrics/vmalert-pure, dest: /usr/sbin/vmalert }

- name: Install Grafana UI assets
  command: cp -rT /opt/pmm-staging/grafana-ui/{{ item.src }} /usr/share/grafana/{{ item.dest }}
  loop:
    - { src: public, dest: public }
    - { src: conf, dest: conf }
    - { src: tools, dest: tools }

- name: Install Grafana configuration files
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: pmm
    group: root
    mode: "0644"
    remote_src: yes
  loop:
    - { src: /opt/pmm-staging/grafana-ui/conf/sample.ini, dest: /etc/grafana/grafana.ini }
    - { src: /opt/pmm-staging/grafana-ui/conf/ldap.toml, dest: /etc/grafana/ldap.toml }

- name: Install pmm-managed data assets
  command: cp -rT /opt/pmm-staging/pmm-managed/data/{{ item.src }} {{ item.dest }}
  loop:
    - { src: swagger, dest: /usr/share/pmm-managed/swagger }
    - { src: advisors, dest: /usr/local/percona/advisors }
    - { src: checks, dest: /usr/local/percona/checks }
    - { src: alerting-templates, dest: /usr/local/percona/alerting-templates }

- name: Install PMM UI assets
  command: cp -rT /opt/pmm-staging/pmm-ui/{{ item.src }} {{ item.dest }}
  loop:
    - { src: pmm-dist, dest: /usr/share/pmm-ui }
    - { src: pmm-compat-dist, dest: /usr/share/percona-dashboards/panels/pmm-compat-app }

- name: Install percona-dashboards assets
  command: cp -rT /opt/pmm-staging/pmm-dashboards/{{ item.src }} {{ item.dest }}
  loop:
    - { src: panels, dest: /usr/share/percona-dashboards/panels }
    - { src: pmm-app-dist, dest: /usr/share/percona-dashboards/panels/pmm-app }

- name: Install VERSION.json
  copy:
    src: /opt/pmm-staging/version.json
    dest: /usr/share/pmm-server/VERSION.json
    owner: root
    group: root
    mode: "0644"
    remote_src: yes

- name: Set ownership on pmm-owned assets
  file:
    path: "{{ item }}"
    state: directory
    owner: pmm
    group: root
    recurse: yes
  loop:
    - /usr/share/grafana
    - /usr/share/pmm-managed
    - /usr/share/pmm-ui
    - /usr/share/percona-dashboards
    - /usr/local/percona



- name: Configure grafana
  include_role:
    name: grafana

- name: Install nginx
  include_role:
    name: nginx

- name: Install clickhouse
  include_role:
    name: clickhouse

- name: Install postgres
  include_role:
    name: postgres

- name: Install supervisord
  include_role:
    name: supervisord

- name: Install pmm-client
  include_role:
    name: pmm-client

- name: Create a backup directory
  file:
    path: /srv/backup
    state: directory
    owner: pmm
    group: root
    mode: 0775

- name: Create a working directory for VictoriaMetrics
  file:
    path: /srv/victoriametrics/data
    state: directory
    owner: pmm
    group: root
    mode: 0775

- name: Create an empty configuration file for VictoriaMetrics
  file:
    path: /etc/victoriametrics-promscrape.yml
    state: touch
    owner: pmm
    group: root
    mode: 0664

# Launch pmm-managed-init first as it may update supervisord configuration on start
- name: Generate new supervisor config
  command: pmm-managed-init
  register: managed_init_result
  changed_when: True

- name: Disable pmm-init
  ini_file:
    path: /etc/supervisord.d/pmm.ini
    section: program:pmm-init
    option: autostart
    value: "false"

# During build time, this will be the first start of supervisord.
- name: Start supervisord
  shell: supervisord -c /etc/supervisord.conf &
  become: true
  become_user: pmm
  become_method: su

- name: Run initialization playbook
  include_role:
    name: initialization

- name: Check supervisord logs
  shell: sleep 10 && tail -n 200 /srv/logs/supervisord.log

- name: Check grafana logs
  shell: cat /srv/logs/grafana.log
