---
- name: Add PostgreSQL 18 YUM repository
  yum_repository:
    name: percona-ppg-18
    description: PostgreSQL YUM repository
    baseurl: http://repo.percona.com/ppg-18/yum/release/$releasever/RPMS/$basearch/
    gpgcheck: yes
    enabled: yes
    gpgkey: file:///etc/pki/rpm-gpg/PERCONA-PACKAGING-KEY

- name: Install Postgres
  when:
    - not ansible_check_mode
  dnf:
    name:
      - percona-postgresql18-server
      - percona-postgresql18-contrib
      - percona-postgresql18
      - percona-postgresql14-server
      - percona-postgresql14-contrib
      - percona-postgresql14
      - python3-psycopg2 # Python PostgreSQL database adapter
    state: installed

- name: Create a socket directory for Postgres
  file:
    path: /run/postgresql
    state: directory
    owner: pmm
    group: root
    mode: 0775  

- name: Create Postgres log file
  file:
    path: /srv/logs/postgresql18.log
    state: touch
    force: yes
    group: root
    owner: pmm
    mode: 0664

- name: Create Postgres data dir
  file:
    path: /srv/postgres18
    state: directory
    owner: pmm
    group: root
    mode: 0750

- name: Generate random password for postgres superuser
  shell: openssl rand -hex 16
  register: postgres_password
  changed_when: false

- name: Store postgres password securely
  copy:
    content: "{{ postgres_password.stdout }}"
    dest: /srv/.postgres_password
    owner: pmm
    group: root
    mode: 0600

- name: Initialize Postgres database with password authentication
  command: /usr/pgsql-18/bin/initdb -D /srv/postgres18 --auth-host=scram-sha-256 --auth-local=trust --username=postgres --pwfile=/srv/.postgres_password
  become: true
  become_user: pmm
  become_method: su

- name: Start Postgres database without supervisor
  command: /usr/pgsql-18/bin/pg_ctl start -D /srv/postgres18 -o "-c logging_collector=off"
  become: true
  become_user: pmm
  become_method: su
  environment:
    PGPASSWORD: "{{ lookup('file', '/srv/.postgres_password') }}"

- name: Create pmm-managed database
  postgresql_db:
    name: pmm-managed
    state: present
  environment:
    PGPASSWORD: "{{ lookup('file', '/srv/.postgres_password') }}"

- name: Create pmm-managed user
  postgresql_user:
    db: pmm-managed
    name: pmm-managed
    password: pmm-managed
    priv: "ALL"
    expires: infinity
    state: present
  environment:
    PGPASSWORD: "{{ lookup('file', '/srv/.postgres_password') }}"

- name: Create pg_stat_statements extension
  postgresql_ext:
    db: postgres
    name: pg_stat_statements
    schema: public
  environment:
    PGPASSWORD: "{{ lookup('file', '/srv/.postgres_password') }}"

- name: Create grafana database in postgres
  postgresql_db:
    name: grafana
    state: present
  environment:
    PGPASSWORD: "{{ lookup('file', '/srv/.postgres_password') }}"

- name: Create grafana user in postgres
  postgresql_user:
    db: grafana
    name: grafana
    password: grafana
    priv: 'ALL'
    expires: infinity
    state: present
  when: not ansible_check_mode
  environment:
    PGPASSWORD: "{{ lookup('file', '/srv/.postgres_password') }}"

- name: Upgrade grafana database to the latest schema
  command: grafana cli --homepath=/usr/share/grafana --config=/etc/grafana/grafana.ini admin data-migration encrypt-datasource-passwords
  changed_when: true

- name: Stop Postgres 18 database
  command: /usr/pgsql-18/bin/pg_ctl stop -D /srv/postgres18
  become: true
  become_user: pmm
  become_method: su
