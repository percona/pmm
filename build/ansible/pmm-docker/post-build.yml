---
# This playbook runs post build tasks for all pmm distributions (AMI/Docker).

- hosts: all
  become: yes
  gather_facts: no

  tasks:
    - name: Stop supervisord service
      command: supervisorctl shutdown
      become: true
      become_user: pmm
      become_method: su

    - name: Cleanup dnf cache
      command: dnf clean all

    - name: Cleanup build logs and package cache
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/log/dnf.log
        - /var/log/secure
        - /var/log/wtmp
        - /var/log/clickhouse-server
        - /var/log/clickhouse-keeper
        - /var/log/nginx
        - /var/lib/pgsql
        - /var/cache/dnf
        - /var/cache/yum
        - /usr/local/percona/pmm/config/pmm-agent.yaml

    - name: Remove users created by installers
      user:
        name: "{{ item }}"
        state: absent
      loop:
        - postgres
        - clickhouse
        - nginx

    - name: Remove auto-generated config files
      file:
        path: "/etc/supervisord.d/{{ item }}"
        state: absent
      loop:
        - victoriametrics.ini
        - vmalert.ini
        - vmproxy.ini
        - qan-api2.ini
        - grafana.ini
        - nomad-server.ini

    - name: Clean pmm-server dir
      shell: find /usr/share/pmm-server -mindepth 1 -maxdepth 1 -not -name "static" -print0 | xargs -0 rm -rf --

    - name: Clean /srv directory for fresh initialization on first start
      file:
        path: /srv
        state: "{{ item }}"
        owner: pmm
        group: root
        mode: 0775
      loop:
        - absent
        - directory
      no_log: true

    - name: Create empty log directory for nginx
      file:
        path: /var/log/nginx
        state: directory
        owner: pmm
        group: root
        mode: 0755

    - name: Empty VictoriaMetrics scrape config
      copy:
        content: ""
        dest: /etc/victoriametrics-promscrape.yml
        owner: pmm
        group: root
        mode: 0664
