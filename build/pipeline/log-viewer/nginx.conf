server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The downloaded log changes per container run; never cache.
    location = /log.txt {
        types { } default_type "text/plain; charset=utf-8";
        add_header Cache-Control "no-store" always;
    }

    # Index page is small and depends on the Monaco bundle below.
    location = / {
        add_header Cache-Control "no-store" always;
    }

    # Monaco assets are immutable for the life of the image.
    location /monaco/ {
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
